[project]
name = "huggingface-inference-toolkit"
version = "0.1.0"
description = "Production-ready inference API on top of Hugging Face (Transformers, Diffusers, and Sentence-Transformers)"
readme = "README.md"
authors = [
  { name = "Alvaro Bartolome", email = "alvaro.bartolome@huggingface.co" },
  { name = "Erik Kaunismäki", email = "erik.kaunismaki@huggingface.co" },
]
maintainers = [
  { name = "Alvaro Bartolome", email = "alvaro.bartolome@huggingface.co" },
  { name = "Erik Kaunismäki", email = "erik.kaunismaki@huggingface.co" },
]
requires-python = ">=3.10"
dependencies = [
    "uvicorn>=0.34.0",
    "fastapi>=0.115.6",
    "prometheus-client>=0.21.1",
    "diffusers>=0.32.1",
    "torch>=2.5.1,<2.7.0",
    "transformers>=4.53.2",
    "pydantic>=2.10.5",
    "accelerate>=1.2.1",
    "huggingface-hub[hf-transfer,hf-xet]>=0.27.1",
    "protobuf>=5.29.3",
    "sentence-transformers>=5.0.0",
    # NOTE: `optimum[onnxruntime]` seems to have a cap on `transformers<4.53.0`
    # "sentence-transformers[onnx]>=5.0.0",
    # NOTE: for GPU that'd be the following
    # "sentence-transformers[onnx-gpu]>=5.0.0",
    "sentencepiece>=0.2.0",
    "protobuf>=5.29.3",
    "peft>=0.14.0",
    "pillow>=11.1.0",
    "open-clip-torch>=2.32.0",
    "pydub>=0.25.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project.scripts]
huggingface-inference-toolkit = "huggingface_inference_toolkit.cli:main"

[tool.ruff]
line-length = 112
