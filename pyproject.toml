[project]
name = "huggingface-inference-toolkit"
version = "0.1.0"
description = "An attempt to refactor the `huggingface-inference-toolkit`"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "uvicorn>=0.34.0",
    "fastapi>=0.115.6",
    "prometheus-client>=0.21.1",
    "diffusers>=0.32.1",
    "torch>=2.5.1",
    "transformers>=4.47.1",
    "pydantic>=2.10.5",
    "accelerate>=1.2.1",
    "huggingface-hub[hf-transfer]>=0.27.1",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.uv.sources]
huggingface-inference-toolkit = { workspace = true }

[project.scripts]
huggingface-inference-toolkit = "huggingface_inference_toolkit.cli:main"

[tool.ruff]
line-length = 112
